version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app/server
      - ./shared:/app/shared
    working_dir: /app
    command: cd server && npm run dev
    environment:
      - NODE_ENV=development
      - PORT=3000

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - ./shared:/app/shared
    working_dir: /app
    command: cd client && npm run dev
    environment:
      - NODE_ENV=development